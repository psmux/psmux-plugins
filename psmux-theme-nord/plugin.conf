# =============================================================================
# psmux-theme-nord - Nord color theme for psmux
# Static .conf version (source-file compatible)
# Style: shaped segments with arrow separators (standard Unicode)
# =============================================================================
#
# Nord palette:
#   Polar Night: nord0=#2e3440 nord1=#3b4252 nord2=#434c5e nord3=#4c566a
#   Snow Storm:  nord4=#d8dee9 nord5=#e5e9f0 nord6=#eceff4
#   Frost:       nord7=#8fbcbb nord8=#88c0d0 nord9=#81a1c1 nord10=#5e81ac
#   Aurora:      nord11=#bf616a nord12=#d08770 nord13=#ebcb8b
#                nord14=#a3be8c nord15=#b48ead

# --- Status bar ---
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#3b4252,fg=#d8dee9"

# Status left: [session][user][base]
set -g status-left "#[bg=#81a1c1,fg=#2e3440,bold] #S #[fg=#81a1c1,bg=#434c5e]#[fg=#d8dee9] #{user} #[fg=#434c5e,bg=#3b4252] "
set -g status-left-length 50

# Status right: PREF time day date
set -g status-right "#{?client_prefix,#[bg=#ebcb8b,fg=#2e3440,bold] PREF #[fg=#ebcb8b,bg=#3b4252] ,}#[fg=#4c566a,bg=#3b4252]#[bg=#4c566a,fg=#8fbcbb] %H:%M #[fg=#434c5e,bg=#4c566a]#[bg=#434c5e,fg=#ebcb8b] %a #[fg=#5e81ac,bg=#434c5e]#[bg=#5e81ac,fg=#eceff4,bold] %d-%b "
set -g status-right-length 80

# Window status (inactive) - shaped tabs
set -g window-status-format "#[fg=#4c566a,bg=#3b4252]#[bg=#4c566a,fg=#d8dee9] #I #W#{?window_flags, #{window_flags},} #[fg=#4c566a,bg=#3b4252]"
set -g window-status-separator ""

# Window status (current/active) - frost blue highlight with arrows
set -g window-status-current-format "#[fg=#88c0d0,bg=#3b4252]#[bg=#88c0d0,fg=#2e3440,bold] #I #W#{?window_flags, #{window_flags},} #[fg=#88c0d0,bg=#3b4252]"

# Activity
set -g window-status-activity-style "fg=#ebcb8b,bg=#3b4252"

# Pane borders
set -g pane-active-border-style "fg=#88c0d0"
set -g pane-border-style "fg=#434c5e"

# Messages
set -g message-style "bg=#434c5e,fg=#d8dee9"
set -g message-command-style "bg=#434c5e,fg=#d8dee9"

# Copy mode / overlay selection
set -g mode-style "bg=#81a1c1,fg=#2e3440"