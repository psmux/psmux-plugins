# =============================================================================
# PPM - Psmux Plugin Manager
# Static .conf version (source-file compatible)
# =============================================================================
# Key bindings:
#   Prefix + I    - Install declared plugins
#   Prefix + U    - Update all plugins
#   Prefix + M    - Remove/clean unused plugins

# Install plugins
bind-key I run-shell 'pwsh -NoProfile -ExecutionPolicy Bypass -File "~/.psmux/plugins/ppm/scripts/install_plugins.ps1"'

# Update plugins
bind-key U run-shell 'pwsh -NoProfile -ExecutionPolicy Bypass -File "~/.psmux/plugins/ppm/scripts/update_plugins.ps1"'

# Clean unused plugins
bind-key M run-shell 'pwsh -NoProfile -ExecutionPolicy Bypass -File "~/.psmux/plugins/ppm/scripts/clean_plugins.ps1"'
