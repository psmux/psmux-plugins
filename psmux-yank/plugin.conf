# =============================================================================
# psmux-yank - Windows clipboard integration for psmux
# Static .conf version (source-file compatible)
# =============================================================================

# --- Copy-mode-vi bindings ---

# 'y' copies selection to clipboard and exits copy mode
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pwsh -NoProfile -File "~/.psmux/plugins/psmux-yank/scripts/copy_to_clipboard.ps1"'

# Enter copies selection to clipboard and exits copy mode
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'pwsh -NoProfile -File "~/.psmux/plugins/psmux-yank/scripts/copy_to_clipboard.ps1"'

# Alt-y copies entire line to clipboard (avoids Y/y case conflict)
bind-key -T copy-mode-vi M-y send-keys -X select-line \; send-keys -X copy-pipe-and-cancel 'pwsh -NoProfile -File "~/.psmux/plugins/psmux-yank/scripts/copy_to_clipboard.ps1"'

# Alt-d copies from cursor to end of line (avoids D/d case conflict)
bind-key -T copy-mode-vi M-d send-keys -X copy-end-of-line 'pwsh -NoProfile -File "~/.psmux/plugins/psmux-yank/scripts/copy_to_clipboard.ps1"'

# --- Normal mode bindings ---

# Prefix + y: Copy entire visible pane content to clipboard
bind-key y capture-pane -J \; run-shell 'pwsh -NoProfile -Command "psmux show-buffer | Set-Clipboard"'

# Prefix + Alt-y: Copy current pane working directory to clipboard
bind-key M-y run-shell 'pwsh -NoProfile -Command "(psmux display-message -p \"#{pane_current_path}\") | Set-Clipboard; psmux display-message \"Path copied to clipboard\""'
