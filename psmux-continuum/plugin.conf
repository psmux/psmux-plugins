# =============================================================================
# psmux-continuum - Auto-save and auto-restore for psmux
# Static .conf version (source-file compatible)
# Requires: psmux-resurrect
# =============================================================================
# Default: auto-save every 15 minutes, auto-restore off, auto-boot off.
#
# NOTE: The auto_save.ps1 script runs a persistent loop (sleeping between
# saves). run-shell executes it asynchronously so it won't block psmux.
# It enforces a per-user singleton via PID file at
# %LOCALAPPDATA%\psmux-continuum\auto_save.pid, so re-firing this hook on
# every client attach will NOT spawn additional loops.

# Start auto-save background loop on client attach (every 15 minutes)
set-hook -g client-attached 'run-shell "pwsh -NoProfile -File \"~/.psmux/plugins/psmux-continuum/scripts/auto_save.ps1\" -IntervalMinutes 15"'

# --- Auto-restore (disabled by default) ---
# Uncomment the following line to auto-restore the last saved session
# when a new session is created:
# set-hook -g after-new-session 'run-shell "pwsh -NoProfile -File \"~/.psmux/plugins/psmux-continuum/scripts/auto_restore.ps1\""'

# --- Auto-boot (disabled by default) ---
# To enable psmux auto-start on Windows login, run manually:
#   pwsh -NoProfile -File "~/.psmux/plugins/psmux-continuum/scripts/boot.ps1" -Enable
# To disable:
#   pwsh -NoProfile -File "~/.psmux/plugins/psmux-continuum/scripts/boot.ps1" -Disable
