# =============================================================================
# psmux-net-speed - Network bandwidth in psmux status bar
# Static .conf version (basic hooks setup)
# =============================================================================
#
# This plugin requires the dynamic .ps1 version to be loaded via run-shell
# for full functionality (delta-based speed calculation).
#
# Quick setup: Add to status-right with #{@net_speed_display} format variable
# set -g status-right '#{@net_speed_display} | %H:%M'

set -g status-interval 5
