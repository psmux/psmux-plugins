# Demo config for testing psmux-git-status plugin
# Uses #{git_status} format (the fixed version)

set -g status on
set -g status-interval 5
set -g status-style 'bg=colour235,fg=colour248'
set -g status-left ' [#{session_name}] '
set -g status-left-style 'fg=colour117,bold'
set -g status-right ' #{git_status}  %H:%M %d-%b '
set -g status-right-style 'fg=colour248'

# Initialize the @git_status option so it shows something before first poll
set -g @git_status "loading..."
set -g @git_branch ""
