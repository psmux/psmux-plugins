# =============================================================================
# psmux-theme-tokyonight - Tokyo Night
# Style: Midnight Code - neon accents, dim inactive tabs, seconds in clock
# =============================================================================
#
# Palette:
#   bg=#1a1b26 bg_dark=#16161e bg_hl=#292e42
#   fg=#c0caf5 fg_dark=#a9b1d6 comment=#565f89
#   blue=#7aa2f7 cyan=#7dcfff green=#9ece6a
#   magenta=#bb9af7 orange=#ff9e64
#   terminal_black=#414868

# --- Status bar ---
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 1
set -g status-style "bg=#1a1b26,fg=#c0caf5"

# Status left: [ session ][ user ]
set -g status-left "#[bg=#7aa2f7,fg=#16161e,bold] #S #[fg=#7aa2f7,bg=#292e42]#[fg=#a9b1d6] #{user} #[fg=#292e42,bg=#1a1b26] "
set -g status-left-length 50

# Status right: [ time:sec | date ] - shows seconds, neon accents
set -g status-right "#{?client_prefix,#[bg=#ff9e64,fg=#16161e,bold] PREF #[fg=#ff9e64,bg=#1a1b26] ,}#[fg=#292e42,bg=#1a1b26]#[bg=#292e42,fg=#7dcfff] %H:%M:%S #[fg=#7aa2f7,bg=#292e42]#[bg=#7aa2f7,fg=#16161e,bold] %a %d-%b "
set -g status-right-length 60

# Inactive tabs: very dim comment-colored text
set -g window-status-format "#[fg=#414868] #I #W#{?window_flags, #{window_flags},} "
set -g window-status-separator ""

# Active tab: neon green powerline pill
set -g window-status-current-format "#[fg=#9ece6a,bg=#1a1b26]#[bg=#9ece6a,fg=#16161e,bold] #I #W#{?window_flags, #{window_flags},} #[fg=#9ece6a,bg=#1a1b26]"

# Activity
set -g window-status-activity-style "fg=#e0af68,bg=#1a1b26"

# Pane borders
set -g pane-active-border-style "fg=#7aa2f7"
set -g pane-border-style "fg=#292e42"

# Messages
set -g message-style "bg=#292e42,fg=#c0caf5"
set -g message-command-style "bg=#292e42,fg=#c0caf5"

# Copy/overlay
set -g mode-style "bg=#7aa2f7,fg=#16161e"