# =============================================================================
# psmux-cpu - CPU and memory usage in psmux status bar
# Static .conf version (source-file compatible)
# =============================================================================
# Use #{@cpu_display} and #{@ram_display} in your status-right to show
# system stats. Or leave the defaults below for a ready-to-go status bar.
# The system_stats.ps1 script updates @cpu_percentage, @ram_percentage, etc.

# --- Default placeholder values (shown until first poll completes) ---
set -g @cpu_percentage "…"
set -g @cpu_display "#[fg=default]CPU:…#[default]"
set -g @ram_percentage "…"
set -g @ram_display "#[fg=default]MEM:…#[default]"
set -g @ram_used "…"
set -g @ram_total "…"

# --- Status bar format showing CPU & RAM ---
set -g status-right "#{@cpu_display} #{@ram_display}  %H:%M %d-%b-%y"
set -g status-interval 5

# Poll system stats on client attach and periodically via status-interval
set-hook -g client-attached 'run-shell "pwsh -NoProfile -File \"~/.psmux/plugins/psmux-cpu/scripts/system_stats.ps1\""'
set-hook -g status-interval 'run-shell "pwsh -NoProfile -File \"~/.psmux/plugins/psmux-cpu/scripts/system_stats.ps1\""'

# Prefix + Ctrl-c: Show detailed CPU/memory info
bind-key C-c run-shell 'pwsh -NoProfile -File "~/.psmux/plugins/psmux-cpu/scripts/cpu_info.ps1"'
