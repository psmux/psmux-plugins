# =============================================================================
# psmux-theme-catppuccin - Catppuccin Mocha
# Style: Classic Powerline - clean segments, flat inactive tabs, pill active tab
# =============================================================================
#
# Palette:
#   base=#1e1e2e surface0=#313244 surface1=#45475a surface2=#585b70
#   text=#cdd6f4 subtext0=#a6adc8 overlay0=#6c7086
#   blue=#89b4fa green=#a6e3a1 mauve=#cba6f7 peach=#fab387
#   sky=#89dceb yellow=#f9e2af crust=#11111b

# --- Status bar ---
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Status left: [ session ][ user ]
set -g status-left "#[bg=#89b4fa,fg=#11111b,bold] #S #[fg=#89b4fa,bg=#313244]#[fg=#a6adc8] #{user} #[fg=#313244,bg=#1e1e2e] "
set -g status-left-length 50

# Status right: [ time | day | date ]
set -g status-right "#{?client_prefix,#[bg=#fab387,fg=#11111b,bold] PREF #[fg=#fab387,bg=#1e1e2e] ,}#[fg=#45475a,bg=#1e1e2e]#[bg=#45475a,fg=#89dceb] %H:%M #[fg=#585b70,bg=#45475a]#[bg=#585b70,fg=#f9e2af] %a #[fg=#cba6f7,bg=#585b70]#[bg=#cba6f7,fg=#11111b,bold] %d-%b "
set -g status-right-length 80

# Inactive tabs: flat text, no background, no arrows
set -g window-status-format "#[fg=#585b70] #I #W#{?window_flags, #{window_flags},} "
set -g window-status-separator ""

# Active tab: green powerline pill
set -g window-status-current-format "#[fg=#a6e3a1,bg=#1e1e2e]#[bg=#a6e3a1,fg=#11111b,bold] #I #W#{?window_flags, #{window_flags},} #[fg=#a6e3a1,bg=#1e1e2e]"

# Activity
set -g window-status-activity-style "fg=#fab387,bg=#1e1e2e"

# Pane borders
set -g pane-active-border-style "fg=#89b4fa"
set -g pane-border-style "fg=#313244"

# Messages
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g message-command-style "bg=#313244,fg=#cdd6f4"

# Copy/overlay
set -g mode-style "bg=#89b4fa,fg=#11111b"