# =============================================================================
# psmux-git-status - Git branch & status in psmux status bar
# Static .conf version (basic setup)
# =============================================================================
#
# Use #{git_status} in your status-right or status-left.
# The plugin script updates @git_status and @git_branch on each poll.

# --- Default placeholder values (shown until first poll completes) ---
set -g @git_status ""
set -g @git_branch ""

set -g status-interval 5

# Poll git status on client attach and periodically via status-interval
set-hook -g client-attached 'run-shell "pwsh -NoProfile -File \"~/.psmux/plugins/psmux-git-status/scripts/git_status.ps1\""'
set-hook -g status-interval 'run-shell "pwsh -NoProfile -File \"~/.psmux/plugins/psmux-git-status/scripts/git_status.ps1\""'
