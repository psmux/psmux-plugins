# =============================================================================
# psmux-theme-kanagawa - Kanagawa color theme for psmux
# Static .conf version (source-file compatible)
# Variant: wave (default), Powerline: on, Icons: nerd font
# =============================================================================
#
# Kanagawa Wave palette (inspired by Katsushika Hokusai):
#   bg=#1f1f28 bg_dark=#16161d bg_light=#2a2a37
#   fg=#dcd7ba fg_dark=#c8c093 fg_comment=#727169
#   wave_blue1=#223249 wave_blue2=#2d4f67
#   winter_blue=#252535 winter_green=#2b3328
#   samurai_red=#e82424 autumn_red=#e46876 autumn_yellow=#dca561
#   spring_blue=#7fb4ca spring_green=#98bb6c spring_violet=#9cabca
#   crystal_blue=#7e9cd8 surimi_orange=#ffa066
#   old_white=#c8c093 fuji_white=#dcd7ba

# --- Status bar ---
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#1f1f28,fg=#dcd7ba"

# Status left: wave icon + session on crystal_blue with powerline
set -g status-left "#[bg=#7e9cd8,fg=#1f1f28,bold] 󰊠 #S #[fg=#7e9cd8,bg=#223249]#[fg=#c8c093,bg=#223249]  #{user} #[fg=#223249,bg=#1f1f28] "
set -g status-left-length 40

# Status right: prefix + time + date with gradient segments
set -g status-right "#{?client_prefix,#[fg=#e82424]#[bg=#1f1f28]#[bg=#e82424]#[fg=#1f1f28,bold] 󰌌 PREF #[fg=#e82424]#[bg=#1f1f28],}#[fg=#2a2a37,bg=#1f1f28]#[fg=#98bb6c,bg=#2a2a37]  %H:%M #[fg=#2d4f67,bg=#2a2a37]#[fg=#dca561,bg=#2d4f67] 󰃭 %a #[fg=#7e9cd8,bg=#2d4f67]#[fg=#1f1f28,bg=#7e9cd8,bold] 󰃰 %d-%b "
set -g status-right-length 80

# Window status (inactive) - slant style
set -g window-status-format "#[fg=#223249,bg=#1f1f28]#[fg=#727169,bg=#223249]  #I  #W #[fg=#223249,bg=#1f1f28]"

# Window status (current/active) - spring_green highlight
set -g window-status-current-format "#[fg=#98bb6c,bg=#1f1f28]#[fg=#1f1f28,bg=#98bb6c,bold]  #I  #W #[fg=#98bb6c,bg=#1f1f28]"

# Activity
set -g window-status-activity-style "fg=#ffa066,bg=#1f1f28"

# Pane borders
set -g pane-active-border-style "fg=#7e9cd8"
set -g pane-border-style "fg=#223249"

# Messages
set -g message-style "bg=#223249,fg=#dcd7ba"
set -g message-command-style "bg=#223249,fg=#dcd7ba"

# Copy mode
set -g mode-style "bg=#2d4f67,fg=#dcd7ba"
