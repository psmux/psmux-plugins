# =============================================================================
# psmux-theme-rosepine - Rose Pine
# Style: Soft Dreamy - muted palette, dot separators, rose accent pill
# =============================================================================
#
# Palette:
#   base=#191724 surface=#1f1d2e overlay=#26233a
#   muted=#6e6a86 subtle=#908caa text=#e0def4
#   love=#eb6f92 gold=#f6c177 rose=#ebbcba
#   pine=#31748f foam=#9ccfd8 iris=#c4a7e7
#   hl_med=#403d52

# --- Status bar ---
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#191724,fg=#e0def4"

# Status left: [ session ][ user ] - iris accent
set -g status-left "#[bg=#c4a7e7,fg=#191724,bold] #S #[fg=#c4a7e7,bg=#26233a]#[fg=#908caa] #{user} #[fg=#26233a,bg=#191724] "
set -g status-left-length 50

# Status right: elegant [ time | day-date ]
set -g status-right "#{?client_prefix,#[bg=#eb6f92,fg=#191724,bold] PREF #[fg=#eb6f92,bg=#191724] ,}#[fg=#26233a,bg=#191724]#[bg=#26233a,fg=#9ccfd8] %H:%M #[fg=#31748f,bg=#26233a]#[bg=#31748f,fg=#e0def4,bold] %a %d-%b "
set -g status-right-length 60

# Inactive tabs: muted text with middle-dot separator
set -g window-status-format "#[fg=#6e6a86] #I #W#{?window_flags, #{window_flags},} "
set -g window-status-separator "#[fg=#403d52]+"

# Active tab: soft rose powerline pill
set -g window-status-current-format "#[fg=#ebbcba,bg=#191724]#[bg=#ebbcba,fg=#191724,bold] #I #W#{?window_flags, #{window_flags},} #[fg=#ebbcba,bg=#191724]"

# Activity
set -g window-status-activity-style "fg=#f6c177,bg=#191724"

# Pane borders
set -g pane-active-border-style "fg=#c4a7e7"
set -g pane-border-style "fg=#26233a"

# Messages
set -g message-style "bg=#26233a,fg=#e0def4"
set -g message-command-style "bg=#26233a,fg=#e0def4"

# Copy/overlay
set -g mode-style "bg=#c4a7e7,fg=#191724"