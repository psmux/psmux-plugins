# =============================================================================
# psmux-theme-rosepine - Rosé Pine color theme for psmux
# Static .conf version (source-file compatible)
# Variant: main (default), Powerline: on, Icons: nerd font
# =============================================================================
#
# Rosé Pine palette (main):
#   base=#191724 surface=#1f1d2e overlay=#26233a
#   muted=#6e6a86 subtle=#908caa text=#e0def4
#   love=#eb6f92 gold=#f6c177 rose=#ebbcba
#   pine=#31748f foam=#9ccfd8 iris=#c4a7e7
#   highlight_low=#21202e highlight_med=#403d52 highlight_high=#524f67

# --- Status bar ---
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#191724,fg=#e0def4"

# Status left: session icon + name on iris with powerline arrow
set -g status-left "#[bg=#c4a7e7,fg=#191724,bold]  #S #[fg=#c4a7e7,bg=#26233a]#[fg=#908caa,bg=#26233a] #(whoami) #[fg=#26233a,bg=#191724] "
set -g status-left-length 40

# Status right: prefix indicator + segments with nerd font icons
set -g status-right "#{?client_prefix,#[fg=#eb6f92]#[bg=#191724]#[bg=#eb6f92]#[fg=#191724,bold]  PREF #[fg=#eb6f92]#[bg=#191724],}#[fg=#26233a,bg=#191724]#[fg=#9ccfd8,bg=#26233a]  %H:%M #[fg=#403d52,bg=#26233a]#[fg=#f6c177,bg=#403d52]  %a #[fg=#31748f,bg=#403d52]#[fg=#e0def4,bg=#31748f,bold]  %d-%b "
set -g status-right-length 80

# Window status (inactive) - rounded pill shape
set -g window-status-format "#[fg=#26233a,bg=#191724]#[fg=#6e6a86,bg=#26233a]  #I  #W #[fg=#26233a,bg=#191724]"

# Window status (current/active) - rose highlight, rounded pill
set -g window-status-current-format "#[fg=#ebbcba,bg=#191724]#[fg=#191724,bg=#ebbcba,bold]  #I  #W #[fg=#ebbcba,bg=#191724]"

# Activity
set -g window-status-activity-style "fg=#f6c177,bg=#191724"

# Pane borders
set -g pane-active-border-style "fg=#c4a7e7"
set -g pane-border-style "fg=#26233a"

# Messages
set -g message-style "bg=#26233a,fg=#e0def4"
set -g message-command-style "bg=#26233a,fg=#e0def4"

# Copy mode
set -g mode-style "bg=#c4a7e7,fg=#191724"
