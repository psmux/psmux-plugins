# =============================================================================
# psmux-theme-gruvbox - Gruvbox color theme for psmux
# Static .conf version (source-file compatible)
# Variant: dark, Contrast: medium, Powerline: on
# =============================================================================
#
# Gruvbox dark/medium palette:
#   bg=#282828 bg1=#3c3836 bg2=#504945 bg3=#665c54 bg4=#7c6f64
#   fg=#ebdbb2 fg1=#fbf1c7
#   red=#fb4934 green=#b8bb26 yellow=#fabd2f blue=#83a598
#   purple=#d3869b aqua=#8ec07c orange=#fe8019 gray=#928374

# --- Status bar ---
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#282828,fg=#ebdbb2"

# Status left: session icon + name + user segment
set -g status-left "#[bg=#fabd2f,fg=#282828,bold]  #S #[fg=#fabd2f,bg=#3c3836]#[fg=#d5c4a1,bg=#3c3836]  #{user} #[fg=#3c3836,bg=#282828] "
set -g status-left-length 45

# Status right: prefix + time + day + date gradient segments with icons
set -g status-right "#{?client_prefix,#[fg=#fe8019]#[bg=#282828]#[bg=#fe8019]#[fg=#282828,bold] 󰌌 PREF #[fg=#fe8019]#[bg=#282828],}#[fg=#504945,bg=#282828]#[fg=#8ec07c,bg=#504945]  %H:%M #[fg=#665c54,bg=#504945]#[fg=#83a598,bg=#665c54] 󰃭 %a #[fg=#fabd2f,bg=#665c54]#[fg=#282828,bg=#fabd2f,bold] 󰃰 %d-%b "
set -g status-right-length 80

# Window status (inactive) - shaped tab with icon
set -g window-status-format "#[fg=#3c3836,bg=#282828]#[fg=#928374,bg=#3c3836]  #I  #W #[fg=#3c3836,bg=#282828]"

# Window status (current/active) - green highlight, shaped tab with icon
set -g window-status-current-format "#[fg=#b8bb26,bg=#282828]#[fg=#282828,bg=#b8bb26,bold]  #I  #W #[fg=#b8bb26,bg=#282828]"

# Activity
set -g window-status-activity-style "fg=#fe8019,bg=#3c3836"

# Pane borders
set -g pane-active-border-style "fg=#8ec07c"
set -g pane-border-style "fg=#3c3836"

# Messages
set -g message-style "bg=#504945,fg=#ebdbb2"
set -g message-command-style "bg=#504945,fg=#ebdbb2"

# Copy mode
set -g mode-style "bg=#fabd2f,fg=#282828"
