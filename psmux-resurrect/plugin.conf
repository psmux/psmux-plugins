# =============================================================================
# psmux-resurrect - Save and restore psmux sessions
# Static .conf version (source-file compatible)
# =============================================================================
# Key bindings (customizable via @resurrect-save and @resurrect-restore):
#   Prefix + Ctrl-s  - Save environment  (default)
#   Prefix + Ctrl-r  - Restore environment (default)
#
# Options:
#   set -g @resurrect-dir '~/.psmux/resurrect'           # custom save dir
#   set -g @resurrect-capture-pane-contents 'on'          # save pane contents
#   set -g @resurrect-processes 'ssh python node'         # extra processes to restore
#   set -g @resurrect-processes 'false'                   # disable process restore
#   set -g @resurrect-processes ':all:'                   # restore all (dangerous)
#   set -g @resurrect-save 'S'                            # custom save key
#   set -g @resurrect-restore 'R'                         # custom restore key

# Save psmux environment
bind-key C-s run-shell 'pwsh -NoProfile -ExecutionPolicy Bypass -File "~/.psmux/plugins/psmux-resurrect/scripts/save.ps1"'

# Restore psmux environment
bind-key C-r run-shell 'pwsh -NoProfile -ExecutionPolicy Bypass -File "~/.psmux/plugins/psmux-resurrect/scripts/restore.ps1"'
