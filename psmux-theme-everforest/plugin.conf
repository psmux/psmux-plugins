# =============================================================================
# psmux-theme-everforest - Everforest color theme for psmux
# Static .conf version (source-file compatible)
# Variant: dark-medium (default), Powerline: on, Icons: nerd font
# =============================================================================
#
# Everforest dark-medium palette:
#   bg0=#2d353b bg1=#343f44 bg2=#3d484d bg3=#475258 bg4=#4f585e bg5=#56635f
#   fg=#d3c6aa orange=#e69875 red=#e67e80 yellow=#dbbc7f green=#a7c080
#   aqua=#83c092 blue=#7fbbb3 purple=#d699b6 gray0=#7a8478 gray1=#859289
#   gray2=#9da9a0 statusline1=#a7c080 statusline2=#d3c6aa statusline3=#e67e80

# --- Status bar ---
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#2d353b,fg=#d3c6aa"

# Status left: tree icon + session on green
set -g status-left "#[bg=#a7c080,fg=#2d353b,bold] 󰔱 #S #[fg=#a7c080,bg=#343f44]#[fg=#9da9a0,bg=#343f44]  #(whoami) #[fg=#343f44,bg=#2d353b] "
set -g status-left-length 40

# Status right: prefix + time + date segments
set -g status-right "#{?client_prefix,#[fg=#e67e80]#[bg=#2d353b]#[bg=#e67e80]#[fg=#2d353b,bold] 󰌌 PREF #[fg=#e67e80]#[bg=#2d353b],}#[fg=#3d484d,bg=#2d353b]#[fg=#7fbbb3,bg=#3d484d]  %H:%M #[fg=#475258,bg=#3d484d]#[fg=#dbbc7f,bg=#475258] 󰃭 %a #[fg=#a7c080,bg=#475258]#[fg=#2d353b,bg=#a7c080,bold] 󰃰 %d-%b "
set -g status-right-length 80

# Window status (inactive) - rounded
set -g window-status-format "#[fg=#343f44,bg=#2d353b]#[fg=#7a8478,bg=#343f44]  #I  #W #[fg=#343f44,bg=#2d353b]"

# Window status (current/active) - aqua highlight
set -g window-status-current-format "#[fg=#83c092,bg=#2d353b]#[fg=#2d353b,bg=#83c092,bold]  #I  #W #[fg=#83c092,bg=#2d353b]"

# Activity
set -g window-status-activity-style "fg=#e69875,bg=#2d353b"

# Pane borders
set -g pane-active-border-style "fg=#a7c080"
set -g pane-border-style "fg=#343f44"

# Messages
set -g message-style "bg=#343f44,fg=#d3c6aa"
set -g message-command-style "bg=#343f44,fg=#d3c6aa"

# Copy mode
set -g mode-style "bg=#a7c080,fg=#2d353b"
