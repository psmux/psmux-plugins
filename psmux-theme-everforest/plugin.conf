# =============================================================================
# psmux-theme-everforest - Everforest Dark
# Style: Forest Canopy - right-capped inactive, aqua pill active, earthy tones
# =============================================================================
#
# Palette:
#   bg0=#2d353b bg1=#343f44 bg2=#3d484d bg3=#475258
#   fg=#d3c6aa gray0=#7a8478 gray2=#9da9a0
#   red=#e67e80 orange=#e69875 yellow=#dbbc7f green=#a7c080
#   aqua=#83c092 blue=#7fbbb3 purple=#d699b6

# --- Status bar ---
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "bg=#2d353b,fg=#d3c6aa"

# Status left: [ session ][ user ]
set -g status-left "#[bg=#a7c080,fg=#2d353b,bold] #S #[fg=#a7c080,bg=#343f44]#[fg=#9da9a0] #{user} #[fg=#343f44,bg=#2d353b] "
set -g status-left-length 50

# Status right: earthy [ time | day | date ]
set -g status-right "#{?client_prefix,#[bg=#e67e80,fg=#2d353b,bold] PREF #[fg=#e67e80,bg=#2d353b] ,}#[fg=#3d484d,bg=#2d353b]#[bg=#3d484d,fg=#7fbbb3] %H:%M #[fg=#475258,bg=#3d484d]#[bg=#475258,fg=#dbbc7f] %a #[fg=#a7c080,bg=#475258]#[bg=#a7c080,fg=#2d353b,bold] %d-%b "
set -g status-right-length 80

# Inactive tabs: right-capped (trailing arrow, subtle bg)
set -g window-status-format "#[bg=#343f44,fg=#7a8478] #I #W#{?window_flags, #{window_flags},} #[fg=#343f44,bg=#2d353b]"
set -g window-status-separator ""

# Active tab: aqua green powerline pill
set -g window-status-current-format "#[fg=#83c092,bg=#2d353b]#[bg=#83c092,fg=#2d353b,bold] #I #W#{?window_flags, #{window_flags},} #[fg=#83c092,bg=#2d353b]"

# Activity
set -g window-status-activity-style "fg=#e69875,bg=#2d353b"

# Pane borders
set -g pane-active-border-style "fg=#a7c080"
set -g pane-border-style "fg=#343f44"

# Messages
set -g message-style "bg=#343f44,fg=#d3c6aa"
set -g message-command-style "bg=#343f44,fg=#d3c6aa"

# Copy/overlay
set -g mode-style "bg=#a7c080,fg=#2d353b"